name: AutoTestKit Regression Pipeline

on:
  pull_request:
    branches: [ main ]

jobs:
  regression:
    runs-on: ubuntu-latest

    env:
      BASE_URL_API: ${{ vars.BASE_URL_API || 'https://api.staging.example.com' }}
      BASE_URL_UI: ${{ vars.BASE_URL_UI || 'https://ui.staging.example.com' }}
      BROWSER: ${{ vars.BROWSER || 'chrome' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Regression Suite
        run: mvn test -Dgroups=regression

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin
